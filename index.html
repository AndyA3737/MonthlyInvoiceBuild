<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Invoice Builder · SalonIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --navy:   #1C2B3A;
    --teal:   #00B5A4;
    --teal-d: #008F81;
    --bg:     #F2F5F8;
    --card:   #FFFFFF;
    --border: #E2E8EF;
    --text:   #1C2B3A;
    --muted:  #64748B;
  }
  * { box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; margin: 0; }

  table { border-collapse: collapse; width: 100%; }
  thead th {
    position: sticky; top: 0; z-index: 10; background: #F8FAFC;
    border-bottom: 2px solid var(--border); white-space: nowrap;
    color: var(--muted); font-weight: 600; padding: 10px 14px;
    text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover td { background: #F0FAF9; }
  tbody td { padding: 9px 14px; font-size: 13px; white-space: nowrap; color: var(--text); }

  input, select {
    background: #fff; border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 8px 12px; font-size: 14px; font-family: inherit;
  }
  input:focus, select:focus { outline: 2px solid var(--teal); outline-offset: 0; border-color: var(--teal); }
  input::placeholder { color: #94A3B8; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px; border: none;
    border-radius: 8px; padding: 9px 20px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.15s, opacity 0.15s;
    font-family: inherit; white-space: nowrap;
  }
  .btn-teal    { background: var(--teal); color: #fff; }
  .btn-teal:hover:not(:disabled)    { background: var(--teal-d); }
  .btn-navy    { background: var(--navy); color: #fff; }
  .btn-navy:hover:not(:disabled)    { background: #243547; }
  .btn-outline { background: transparent; color: var(--teal); border: 1.5px solid var(--teal); }
  .btn-outline:hover:not(:disabled) { background: #E8FAF8; }
  .btn-danger  { background: transparent; color: #DC2626; border: 1.5px solid #FECACA; }
  .btn-danger:hover:not(:disabled)  { background: #FEF2F2; }
  .btn-sm      { padding: 6px 14px; font-size: 13px; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .badge-connected    { background: #D1FAF5; color: #007A6D; }
  .badge-disconnected { background: #F1F5F9; color: var(--muted); }
  .badge-expired      { background: #FEF9C3; color: #854D0E; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    padding: 13px 20px; border-radius: 10px; font-size: 14px; font-weight: 500;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15); max-width: 420px; line-height: 1.4;
    transition: opacity 0.3s;
  }
  .toast-success { background: #D1FAF5; color: #007A6D; border: 1px solid #A7F3EC; }
  .toast-error   { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }
  .toast-info    { background: var(--navy); color: #E2E8F0; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 16px; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #F2F5F8; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header style="background:var(--navy); padding:14px 32px; display:flex; align-items:center; justify-content:space-between; gap:16px;">
  <div style="display:flex; align-items:center; gap:12px;">
    <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
      <rect width="34" height="34" rx="9" fill="#00B5A4"/>
      <text x="8" y="25" font-size="20" font-weight="800" fill="white" font-family="Arial,sans-serif">S</text>
    </svg>
    <div>
      <div style="color:#fff;font-weight:700;font-size:16px;line-height:1.2;">SalonIQ</div>
      <div style="color:#94A3B8;font-size:11px;letter-spacing:0.04em;">MONTHLY INVOICE BUILDER</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="badge badge-disconnected" id="qbBadge"><span class="dot"></span><span id="qbBadgeText">QuickBooks: Not Connected</span></span>
    <button class="btn btn-teal"   id="qbConnectBtn"    onclick="connectQuickBooks()"    style="padding:7px 14px;font-size:13px;">Connect QuickBooks</button>
    <button class="btn btn-danger" id="qbDisconnectBtn" onclick="disconnectQuickBooks()" style="padding:7px 14px;font-size:13px;display:none;">Disconnect</button>
  </div>
</header>

<!-- ── Main ────────────────────────────────────────────────────────────────── -->
<main style="max-width:1500px;margin:0 auto;padding:28px 32px;">

  <!-- Controls card -->
  <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px;">
    <h2 style="margin:0 0 20px;font-size:17px;font-weight:700;color:var(--navy);">Select Invoice Period</h2>
    <div style="display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap;">
      <div>
        <label style="display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em;">Source</label>
        <select id="sourceSelect" style="min-width:180px;"></select>
      </div>
      <div>
        <label style="display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em;">Month</label>
        <select id="monthSelect" style="min-width:150px;">
          <option value="1">January</option><option value="2">February</option>
          <option value="3">March</option><option value="4">April</option>
          <option value="5">May</option><option value="6">June</option>
          <option value="7">July</option><option value="8">August</option>
          <option value="9">September</option><option value="10">October</option>
          <option value="11">November</option><option value="12">December</option>
        </select>
      </div>
      <div>
        <label style="display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em;">Year</label>
        <select id="yearSelect" style="min-width:100px;"></select>
      </div>
      <button class="btn btn-teal" id="loadBtn" onclick="loadInvoices()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
        Load Invoices
      </button>
      <button class="btn btn-navy" id="exportBtn" onclick="exportToQuickBooks()" disabled style="margin-left:auto;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Export to QuickBooks
      </button>
    </div>
  </div>

  <!-- ── Invoices ─────────────────────────────────────────────────────────── -->
  <div id="pane-invoices" style="background:var(--card);border:1px solid var(--border);border-radius:12px;">

    <!-- Loading -->
    <div id="loadingState" style="display:none;text-align:center;padding:72px 32px;">
      <div class="spinner"></div>
      <div id="loadingText" style="color:var(--muted);font-size:14px;">Fetching invoices...</div>
    </div>

    <!-- Empty -->
    <div id="emptyState" style="text-align:center;padding:72px 32px;color:var(--muted);">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="margin:0 auto 16px;display:block;opacity:0.35;">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25z"/>
      </svg>
      <div style="font-size:16px;font-weight:600;margin-bottom:8px;color:var(--navy);">No invoices loaded</div>
      <div style="font-size:14px;">Select a month and year above, then click <strong>Load Invoices</strong></div>
    </div>

    <!-- Results -->
    <div id="resultsCard" style="display:none;">
      <div style="padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <div style="font-size:15px;font-weight:700;color:var(--navy);" id="resultsTitle">Invoices</div>
        <div style="display:flex;align-items:center;gap:16px;">
          <div style="font-size:13px;color:var(--muted);" id="resultsCount"></div>
          <div style="font-size:13px;font-weight:600;color:var(--teal);" id="resultsTotal"></div>
        </div>
      </div>
      <div style="overflow-x:auto;max-height:540px;overflow-y:auto;">
        <table id="invoiceTable"><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table>
      </div>
    </div>
  </div>

</main>

<div id="toast" class="toast" style="display:none;"></div>

<script>
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let currentData = [];

// ── Boot ──────────────────────────────────────────────────────────────────────

function initSelectors() {
  const yearSel = document.getElementById('yearSelect');
  const now = new Date(), cy = now.getFullYear();
  for (let y = cy + 1; y >= 2020; y--) {
    const o = document.createElement('option'); o.value = y; o.textContent = y; yearSel.appendChild(o);
  }
  const pv = now.getMonth() || 12;
  const py = now.getMonth() === 0 ? cy - 1 : cy;
  document.getElementById('monthSelect').value = pv;
  yearSel.value = py;
}

async function boot() {
  initSelectors();
  await loadSources();
  await checkQuickBooksStatus();
}

async function loadSources() {
  try {
    const sources = await apiFetch('/api/sources');
    const sel = document.getElementById('sourceSelect');
    sel.innerHTML = '';
    sources.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id; opt.textContent = s.label; sel.appendChild(opt);
    });
  } catch(e) { console.error('Could not load sources', e); }
}

// ── QuickBooks status ────────────────────────────────────────────────────────

async function checkQuickBooksStatus() {
  try {
    const data = await apiFetch('/api/quickbooks/status');
    updateQuickBooksUI(data);
    const params = new URLSearchParams(window.location.search);
    if (params.get('quickbooks') === 'connected') {
      showToast('Successfully connected to QuickBooks: ' + (data.company || ''), 'success');
      window.history.replaceState({}, '', '/');
    }
    const err = params.get('quickbooks_error');
    if (err) { showToast('QuickBooks connection failed: ' + decodeURIComponent(err), 'error'); window.history.replaceState({}, '', '/'); }
  } catch(e) { console.error(e); }
}

function updateQuickBooksUI(status) {
  const badge = document.getElementById('qbBadge');
  const text  = document.getElementById('qbBadgeText');
  const conn  = document.getElementById('qbConnectBtn');
  const disc  = document.getElementById('qbDisconnectBtn');
  if (status.connected && !status.expired) {
    badge.className = 'badge badge-connected'; text.textContent = 'QuickBooks: ' + status.company;
    conn.style.display = 'none'; disc.style.display = '';
  } else if (status.connected && status.expired) {
    badge.className = 'badge badge-expired'; text.textContent = 'QuickBooks: Token Expired';
    conn.style.display = ''; disc.style.display = '';
  } else {
    badge.className = 'badge badge-disconnected'; text.textContent = 'QuickBooks: Not Connected';
    conn.style.display = ''; disc.style.display = 'none';
  }
  document.getElementById('exportBtn').disabled =
    !(status.connected && !status.expired && currentData.length > 0);
}

function connectQuickBooks()    { window.location.href = '/auth/quickbooks'; }
async function disconnectQuickBooks() {
  if (!confirm('Disconnect from QuickBooks?')) return;
  await apiFetch('/api/quickbooks/disconnect', 'POST');
  updateQuickBooksUI({ connected: false });
  showToast('Disconnected from QuickBooks', 'info');
}

// ── Load invoices ─────────────────────────────────────────────────────────────

async function loadInvoices() {
  const month = document.getElementById('monthSelect').value;
  const year  = document.getElementById('yearSelect').value;
  const btn   = document.getElementById('loadBtn');
  btn.disabled = true;
  showLoading('Fetching invoices from SalonIQ LIVE…');
  try {
    const source = document.getElementById('sourceSelect').value || 'stripe';
    const data = await apiFetch(`/api/invoices?month=${month}&year=${year}&source=${source}`);
    currentData = data.data || [];
    renderGrid(currentData, +month, +year);
    await checkQuickBooksStatus();
    if (!currentData.length) { showEmpty(); showToast('No invoices found for this period', 'info'); }
    else showToast(`Loaded ${currentData.length} invoice${currentData.length !== 1 ? 's' : ''}`, 'success');
  } catch(e) { showEmpty(); showToast('Error: ' + e.message, 'error'); }
  finally { btn.disabled = false; hideLoading(); }
}

function renderGrid(rows, month, year) {
  if (!rows || !rows.length) { showEmpty(); return; }
  const source = document.getElementById('sourceSelect').value || 'stripe';

  // Per-source column config
  const SOURCE_CONFIG = {
    stripe: {
      label:      'Stripe Invoices',
      colOrder:   ['AccountCode','Tenantname','SalonName','TerminalBill','TotalBill'],
      colRename:  { AccountCode:'Account', Tenantname:'Tenant', SalonName:'Salon', TerminalBill:'Terminal', TotalBill:'Transactions' },
      rightCols:  new Set(['TerminalBill','TotalBill']),
      totalCols:  { bill:'TotalBill', terminal:'TerminalBill' },
      showTotal:  true,
    },
    subscription: {
      label:      'Subscription Invoices',
      // Include casing variants — only the ones present in the data will be shown
      colOrder:   ['AccountCode','Tenantname','TenantName','Name','SalonName','Salonname','MonthlyAmount'],
      colRename:  {
        AccountCode:'Account',
        Tenantname:'Tenant', TenantName:'Tenant',
        Name:'Salon', SalonName:'Salon', Salonname:'Salon',
        MonthlyAmount:'Monthly Amount',
      },
      rightCols:  new Set(['MonthlyAmount']),
      totalCols:  { bill:'MonthlyAmount', terminal: null },
      showTotal:  false,
    },
  };
  const cfg = SOURCE_CONFIG[source] || SOURCE_CONFIG.stripe;

  document.getElementById('resultsTitle').textContent = MONTH_NAMES[month-1] + ' ' + year + ' — ' + cfg.label;
  document.getElementById('resultsCount').textContent = rows.length + ' record' + (rows.length !== 1 ? 's' : '');

  const billSum     = rows.reduce((a, r) => a + (parseFloat(String(r[cfg.totalCols.bill]    || 0).replace(',','')) || 0), 0);
  const terminalSum = cfg.totalCols.terminal
    ? rows.reduce((a, r) => a + (parseFloat(String(r[cfg.totalCols.terminal] || 0).replace(',','')) || 0), 0) : 0;
  let totalText = (source === 'subscription' ? 'Total: ' : 'Subscriptions: ') + fmtCurrency(billSum);
  if (terminalSum > 0) totalText += '  |  Terminals: ' + fmtCurrency(terminalSum) + '  |  Grand Total: ' + fmtCurrency(billSum + terminalSum);
  document.getElementById('resultsTotal').textContent = totalText;

  const extraHidden = source === 'subscription' ? ['AdminEmail','adminemail','ADMINEMAIL'] : [];
  const HIDDEN_COLS = new Set(['InvoiceDate','INVOICEDATE','QuickBooksClientId','QUICKBOOKSCLIENTID','salonid','SalonId','SALONID',...extraHidden]);
  const COL_ORDER   = cfg.colOrder;
  const COL_RENAME  = cfg.colRename;
  const allCols     = Object.keys(rows[0]).filter(c => !HIDDEN_COLS.has(c));
  const ordered     = COL_ORDER.filter(c => allCols.includes(c));
  const remaining   = allCols.filter(c => !COL_ORDER.includes(c));
  const cols        = [...ordered, ...remaining];

  const thead = document.getElementById('tableHead'), tbody = document.getElementById('tableBody');
  thead.innerHTML = ''; tbody.innerHTML = '';
  const hr = document.createElement('tr');
  const RIGHT_COLS = cfg.rightCols;
  cols.forEach(c => {
    const th = document.createElement('th');
    th.textContent = COL_RENAME[c] || c;
    if (RIGHT_COLS.has(c)) th.style.textAlign = 'right';
    hr.appendChild(th);
  });
  // Add Total column header (Stripe only)
  if (cfg.showTotal) {
    const thTotal = document.createElement('th');
    thTotal.textContent = 'Total';
    thTotal.style.textAlign = 'right';
    hr.appendChild(thTotal);
  }
  thead.appendChild(hr);

  const frag = document.createDocumentFragment();
  rows.forEach(row => {
    const tr = document.createElement('tr');
    cols.forEach(c => {
      const td = document.createElement('td');
      td.textContent = fmtCell(c, row[c]);
      if (RIGHT_COLS.has(c)) td.style.textAlign = 'right';
      tr.appendChild(td);
    });
    // Computed Total column (Stripe only)
    if (cfg.showTotal) {
      const terminal = parseFloat(String(row.TerminalBill || row.TERMINALBILL || 0).replace(',','')) || 0;
      const subs     = parseFloat(String(row.TotalBill    || row.TOTALBILL    || 0).replace(',','')) || 0;
      const tdTotal  = document.createElement('td');
      tdTotal.textContent = fmtCurrency(terminal + subs);
      tdTotal.style.textAlign = 'right';
      tr.appendChild(tdTotal);
    }
    frag.appendChild(tr);
  });
  tbody.appendChild(frag);
  document.getElementById('resultsCard').style.display = '';
  document.getElementById('emptyState').style.display  = 'none';
  hideLoading();
}

// ── Export to QuickBooks ─────────────────────────────────────────────────────

async function exportToQuickBooks() {
  if (!currentData.length) { showToast('No invoices to export', 'error'); return; }
  if (!confirm(`Export ${currentData.length} invoice${currentData.length !== 1 ? 's' : ''} to QuickBooks?`)) return;
  const btn = document.getElementById('exportBtn'), orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;"></span> Exporting…';
  try {
    const source = document.getElementById('sourceSelect').value || 'stripe';
    const month  = +document.getElementById('monthSelect').value;
    const year   = +document.getElementById('yearSelect').value;
    const data = await apiFetch('/api/quickbooks/export', 'POST', { invoices: currentData, source, month, year });
    if (data.success) showToast(`Exported ${data.created} invoice${data.created !== 1 ? 's' : ''} to QuickBooks`, 'success');
    else if (data.created !== undefined) showToast(`Partial: ${data.created} created. Errors: ${(data.errors||[]).join(' | ')}`, 'error');
    else throw new Error(data.error || 'Export failed');
  } catch(e) { showToast('Export failed: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.innerHTML = orig; checkQuickBooksStatus(); }
}

// ── Helpers ───────────────────────────────────────────────────────────────────

async function apiFetch(url, method = 'GET', body = null) {
  const opts = { method, credentials: 'same-origin', headers: {} };
  if (body) { opts.body = JSON.stringify(body); opts.headers['Content-Type'] = 'application/json'; }
  const res = await fetch(url, opts);
  if (res.status === 401) throw new Error('Session expired — please refresh the page');
  let data;
  try { data = await res.json(); }
  catch(e) { throw new Error(`HTTP ${res.status}: non-JSON response from server`); }
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

function showLoading(text) {
  document.getElementById('loadingText').textContent = text || 'Loading…';
  document.getElementById('loadingState').style.display = '';
  document.getElementById('emptyState').style.display   = 'none';
  document.getElementById('resultsCard').style.display  = 'none';
}
function hideLoading() { document.getElementById('loadingState').style.display = 'none'; }
function showEmpty()   {
  document.getElementById('emptyState').style.display   = '';
  document.getElementById('resultsCard').style.display  = 'none';
  document.getElementById('loadingState').style.display = 'none';
}

let _toastTimer;
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.className = 'toast toast-' + type; t.textContent = msg;
  t.style.display = ''; t.style.opacity = '1';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.style.display = 'none', 320); }, 5000);
}

function fmtCurrency(n) {
  return '£' + (+n).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtCell(col, val) {
  if (val === null || val === undefined) return '';
  // Format date columns as DD/MM/YYYY
  if (/date/i.test(col) && val) {
    const s = String(val).trim();
    // Parse "M/D/YYYY H:MM:SS AM/PM" or "M/D/YYYY"
    const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if (m) return `${m[2].padStart(2,'0')}/${m[1].padStart(2,'0')}/${m[3]}`;
  }
  // Format amount columns as £
  if (/bill|amount|total|price|value/i.test(col) && val !== '') {
    const n = parseFloat(String(val).replace(',', ''));
    if (!isNaN(n)) return fmtCurrency(n);
  }
  return String(val);
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

boot();
</script>
</body>
</html>
